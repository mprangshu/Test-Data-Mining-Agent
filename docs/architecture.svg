<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="860" viewBox="0 0 680 860" role="img">
  <title>Test Data Mining Agent — LangGraph pipeline architecture</title>
  <desc>Full pipeline flow: three CI input sources feed ingest, validate, three parallel analysis nodes, suite_health, optional HITL review, synthesis, and persist to produce a quality report.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b6a64" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif; }
      .th  { font-size: 13px; font-weight: 600; fill: #2c2c2a; }
      .ts  { font-size: 11px; font-weight: 400; fill: #5f5e5a; }
      .th-w { font-size: 13px; font-weight: 600; fill: #ffffff; }
      .ts-w { font-size: 11px; font-weight: 400; fill: rgba(255,255,255,0.82); }
      .th-p { font-size: 13px; font-weight: 600; fill: #3c3489; }
      .ts-p { font-size: 11px; font-weight: 400; fill: #534ab7; }
      .th-t { font-size: 13px; font-weight: 600; fill: #085041; }
      .ts-t { font-size: 11px; font-weight: 400; fill: #0f6e56; }
      .th-a { font-size: 13px; font-weight: 600; fill: #633806; }
      .ts-a { font-size: 11px; font-weight: 400; fill: #854f0b; }
      .th-c { font-size: 13px; font-weight: 600; fill: #712b13; }
      .ts-c { font-size: 11px; font-weight: 400; fill: #993c1d; }
      .label { font-size: 10px; font-weight: 400; fill: #888780; }
    </style>
  </defs>

  <!-- ── BACKGROUND ─────────────────────────────────────────── -->
  <rect width="680" height="860" fill="#ffffff"/>

  <!-- ═══════════════════════════════════════════════════════════
       INPUT SOURCES
  ════════════════════════════════════════════════════════════ -->
  <!-- JUnit -->
  <rect x="40" y="22" width="150" height="48" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.8"/>
  <text class="th" x="115" y="42" text-anchor="middle" dominant-baseline="central">JUnit / TestNG</text>
  <text class="ts" x="115" y="58" text-anchor="middle" dominant-baseline="central">XML reports</text>

  <!-- Playwright -->
  <rect x="265" y="22" width="150" height="48" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.8"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Playwright</text>
  <text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central">JSON results</text>

  <!-- Test logs -->
  <rect x="490" y="22" width="150" height="48" rx="8" fill="#f1efe8" stroke="#b4b2a9" stroke-width="0.8"/>
  <text class="th" x="565" y="42" text-anchor="middle" dominant-baseline="central">Test logs</text>
  <text class="ts" x="565" y="58" text-anchor="middle" dominant-baseline="central">stdout / stderr</text>

  <!-- arrows: sources → ingest -->
  <path d="M155 46 Q200 80 220 122" fill="none" stroke="#b4b2a9" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="70" x2="340" y2="122" stroke="#b4b2a9" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M525 70 Q480 96 460 122" fill="none" stroke="#b4b2a9" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════
       NODE 1 — INGEST  (teal)
  ════════════════════════════════════════════════════════════ -->
  <rect x="185" y="122" width="310" height="54" rx="8" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.8"/>
  <text class="th-t" x="340" y="143" text-anchor="middle" dominant-baseline="central">ingest</text>
  <text class="ts-t" x="340" y="161" text-anchor="middle" dominant-baseline="central">Parse all sources → normalised TestResult list</text>
  <line x1="340" y1="176" x2="340" y2="198" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════
       NODE 2 — VALIDATE  (teal)
  ════════════════════════════════════════════════════════════ -->
  <rect x="185" y="198" width="310" height="54" rx="8" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.8"/>
  <text class="th-t" x="340" y="219" text-anchor="middle" dominant-baseline="central">validate</text>
  <text class="ts-t" x="340" y="237" text-anchor="middle" dominant-baseline="central">Schema gates · corrupt-file flags · history check</text>

  <!-- "runs in parallel" label -->
  <text class="label" x="340" y="280" text-anchor="middle">─── runs in parallel ───</text>

  <!-- fan-out: validate → 3 parallel nodes -->
  <path d="M255 252 L120 308" fill="none" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="252" x2="340" y2="308" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M425 252 L560 308" fill="none" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════
       PARALLEL ROW — PURPLE
  ════════════════════════════════════════════════════════════ -->
  <!-- flaky_detect -->
  <rect x="30" y="308" width="180" height="54" rx="8" fill="#eeedfe" stroke="#7f77dd" stroke-width="0.8"/>
  <text class="th-p" x="120" y="329" text-anchor="middle" dominant-baseline="central">flaky_detect</text>
  <text class="ts-p" x="120" y="347" text-anchor="middle" dominant-baseline="central">Score pass/fail variance</text>

  <!-- coverage_gap -->
  <rect x="250" y="308" width="180" height="54" rx="8" fill="#eeedfe" stroke="#7f77dd" stroke-width="0.8"/>
  <text class="th-p" x="340" y="329" text-anchor="middle" dominant-baseline="central">coverage_gap</text>
  <text class="ts-p" x="340" y="347" text-anchor="middle" dominant-baseline="central">Find under-tested modules</text>

  <!-- failure_clustering -->
  <rect x="470" y="308" width="180" height="54" rx="8" fill="#eeedfe" stroke="#7f77dd" stroke-width="0.8"/>
  <text class="th-p" x="560" y="329" text-anchor="middle" dominant-baseline="central">failure_clustering</text>
  <text class="ts-p" x="560" y="347" text-anchor="middle" dominant-baseline="central">Embed → ChromaDB → cluster</text>

  <!-- fan-in: 3 parallel → suite_health -->
  <path d="M120 362 L260 418" fill="none" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="362" x2="340" y2="418" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M560 362 L420 418" fill="none" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════
       NODE — SUITE HEALTH  (teal)
  ════════════════════════════════════════════════════════════ -->
  <rect x="185" y="418" width="310" height="54" rx="8" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.8"/>
  <text class="th-t" x="340" y="439" text-anchor="middle" dominant-baseline="central">suite_health</text>
  <text class="ts-t" x="340" y="457" text-anchor="middle" dominant-baseline="central">Pass rate · mean duration · flake rate trend</text>
  <line x1="340" y1="472" x2="340" y2="494" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── ROUTING DIAMOND ──────────────────────────────────── -->
  <polygon points="340,494 370,516 340,538 310,516" fill="#f1efe8" stroke="#888780" stroke-width="0.8"/>
  <text class="label" x="340" y="518" text-anchor="middle" dominant-baseline="central">autonomy?</text>

  <!-- L2 path — solid, left -->
  <path d="M310 516 L160 516 L160 556" fill="none" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>
  <text class="label" x="124" y="534" text-anchor="middle">L2 only</text>

  <!-- L1/L3 bypass — dashed, right -->
  <path d="M370 516 L510 516 L510 610 L496 610" fill="none" stroke="#9c9a92" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr-dash)"/>
  <text class="label" x="548" y="548" text-anchor="middle">L1 / L3</text>
  <text class="label" x="548" y="560" text-anchor="middle">skip review</text>

  <!-- ═══════════════════════════════════════════════════════════
       NODE — REVIEW / HITL  (amber)
  ════════════════════════════════════════════════════════════ -->
  <rect x="50" y="556" width="220" height="54" rx="8" fill="#faeeda" stroke="#ef9f27" stroke-width="0.8"/>
  <text class="th-a" x="160" y="577" text-anchor="middle" dominant-baseline="central">review  (HITL)</text>
  <text class="ts-a" x="160" y="595" text-anchor="middle" dominant-baseline="central">QA lead confirms / filters findings</text>
  <path d="M160 610 L284 636" fill="none" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════
       NODE — SYNTHESIS  (coral / LLM)
  ════════════════════════════════════════════════════════════ -->
  <rect x="185" y="636" width="310" height="54" rx="8" fill="#faece7" stroke="#d85a30" stroke-width="0.8"/>
  <text class="th-c" x="340" y="657" text-anchor="middle" dominant-baseline="central">synthesis  (LLM)</text>
  <text class="ts-c" x="340" y="675" text-anchor="middle" dominant-baseline="central">Rank findings · write recommendations</text>
  <line x1="340" y1="690" x2="340" y2="712" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════
       NODE — PERSIST  (teal)
  ════════════════════════════════════════════════════════════ -->
  <rect x="185" y="712" width="310" height="54" rx="8" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.8"/>
  <text class="th-t" x="340" y="733" text-anchor="middle" dominant-baseline="central">persist</text>
  <text class="ts-t" x="340" y="751" text-anchor="middle" dominant-baseline="central">Save report to MongoDB run store</text>
  <line x1="340" y1="766" x2="340" y2="788" stroke="#6b6a64" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════════
       OUTPUT
  ════════════════════════════════════════════════════════════ -->
  <rect x="185" y="788" width="310" height="42" rx="8" fill="#2c2c2a" stroke="none"/>
  <text class="th-w" x="340" y="805" text-anchor="middle" dominant-baseline="central">Quality-intelligence report</text>
  <text class="ts-w" x="340" y="821" text-anchor="middle" dominant-baseline="central">Prioritised findings for the QA lead</text>

  <!-- ── LEGEND ─────────────────────────────────────────────── -->
  <rect x="30" y="794" width="130" height="36" rx="6" fill="#f8f7f4" stroke="#d3d1c7" stroke-width="0.5"/>
  <rect x="38" y="803" width="10" height="10" rx="2" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.8"/>
  <text class="label" x="54" y="811">Deterministic</text>
  <rect x="38" y="818" width="10" height="10" rx="2" fill="#eeedfe" stroke="#7f77dd" stroke-width="0.8"/>
  <text class="label" x="54" y="826">Parallel analysis</text>

  <rect x="520" y="794" width="130" height="36" rx="6" fill="#f8f7f4" stroke="#d3d1c7" stroke-width="0.5"/>
  <rect x="528" y="803" width="10" height="10" rx="2" fill="#faece7" stroke="#d85a30" stroke-width="0.8"/>
  <text class="label" x="544" y="811">LLM node</text>
  <rect x="528" y="818" width="10" height="10" rx="2" fill="#faeeda" stroke="#ef9f27" stroke-width="0.8"/>
  <text class="label" x="544" y="826">Human gate (HITL)</text>

</svg>
