<svg width="100%" viewBox="0 0 680 860" role="img">
  <title>Test Data Mining Agent — LangGraph pipeline architecture</title>
  <desc>Full pipeline flow from CI/CD input sources through eight nodes (ingest, validate, three parallel analysis nodes, suite health, optional HITL review, synthesis, persist) to the final report output, with autonomy level routing shown.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── INPUT SOURCES ───────────────────────────────────────────── -->
  <g class="node c-gray">
    <rect x="40" y="20" width="130" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="105" y="38" text-anchor="middle" dominant-baseline="central">JUnit / TestNG</text>
    <text class="ts" x="105" y="56" text-anchor="middle" dominant-baseline="central">XML reports</text>
  </g>
  <g class="node c-gray">
    <rect x="275" y="20" width="130" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="38" text-anchor="middle" dominant-baseline="central">Playwright</text>
    <text class="ts" x="340" y="56" text-anchor="middle" dominant-baseline="central">JSON results</text>
  </g>
  <g class="node c-gray">
    <rect x="510" y="20" width="130" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="575" y="38" text-anchor="middle" dominant-baseline="central">Test logs</text>
    <text class="ts" x="575" y="56" text-anchor="middle" dominant-baseline="central">stdout / stderr</text>
  </g>

  <!-- arrows from sources to ingest -->
  <path d="M105 64 L220 118" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)"/>
  <path d="M340 64 L340 118" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)"/>
  <path d="M575 64 L460 118" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.35" marker-end="url(#arrow)"/>

  <!-- ── NODE 1: INGEST ─────────────────────────────────────────── -->
  <g class="node c-teal">
    <rect x="200" y="118" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">ingest</text>
    <text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">Parse all sources → normalised TestResult list</text>
  </g>
  <line x1="340" y1="174" x2="340" y2="210" class="arr" marker-end="url(#arrow)"/>

  <!-- ── NODE 2: VALIDATE ──────────────────────────────────────── -->
  <g class="node c-teal">
    <rect x="200" y="210" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="230" text-anchor="middle" dominant-baseline="central">validate</text>
    <text class="ts" x="340" y="250" text-anchor="middle" dominant-baseline="central">Schema gates, corrupt-file flags, history check</text>
  </g>

  <!-- fan-out lines from validate to 3 parallel nodes -->
  <path d="M260 266 L130 322" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M340 266 L340 322" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M420 266 L550 322" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- parallel label -->
  <text class="ts" x="340" y="296" text-anchor="middle" fill="var(--t)" opacity="0.5">runs in parallel</text>

  <!-- ── PARALLEL ROW ──────────────────────────────────────────── -->
  <!-- flaky_detect -->
  <g class="node c-purple">
    <rect x="40" y="322" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="342" text-anchor="middle" dominant-baseline="central">flaky_detect</text>
    <text class="ts" x="130" y="362" text-anchor="middle" dominant-baseline="central">Score pass/fail variance per test</text>
  </g>

  <!-- coverage_gap -->
  <g class="node c-purple">
    <rect x="250" y="322" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="342" text-anchor="middle" dominant-baseline="central">coverage_gap</text>
    <text class="ts" x="340" y="362" text-anchor="middle" dominant-baseline="central">Find under-tested modules</text>
  </g>

  <!-- failure_clustering -->
  <g class="node c-purple">
    <rect x="460" y="322" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="550" y="342" text-anchor="middle" dominant-baseline="central">failure_clustering</text>
    <text class="ts" x="550" y="362" text-anchor="middle" dominant-baseline="central">Embed → ChromaDB → cluster</text>
  </g>

  <!-- fan-in arrows to suite_health -->
  <path d="M130 378 L260 432" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M340 378 L340 432" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <path d="M550 378 L420 432" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- ── NODE: SUITE HEALTH ───────────────────────────────────── -->
  <g class="node c-teal">
    <rect x="200" y="432" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="452" text-anchor="middle" dominant-baseline="central">suite_health</text>
    <text class="ts" x="340" y="472" text-anchor="middle" dominant-baseline="central">Pass rate · duration · flake rate trend</text>
  </g>

  <!-- conditional routing label + fork -->
  <line x1="340" y1="488" x2="340" y2="514" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="340" y="510" text-anchor="middle" opacity="0.5">route by autonomy level</text>

  <!-- L2 path (left) -->
  <path d="M340 524 L190 524 L190 558" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <text class="ts" x="155" y="542" text-anchor="middle">L2 only</text>

  <!-- L1/L3 path (right, skip review) -->
  <path d="M340 524 L490 524 L490 604 L420 604" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.4" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="525" y="572" text-anchor="middle">L1 / L3</text>
  <text class="ts" x="525" y="586" text-anchor="middle">skip review</text>

  <!-- ── NODE: REVIEW (HITL) ──────────────────────────────────── -->
  <g class="node c-amber">
    <rect x="80" y="558" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="190" y="578" text-anchor="middle" dominant-baseline="central">review  (HITL)</text>
    <text class="ts" x="190" y="598" text-anchor="middle" dominant-baseline="central">QA lead confirms / filters findings</text>
  </g>
  <path d="M190 614 L300 650" fill="none" stroke="var(--t)" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>

  <!-- ── NODE: SYNTHESIS ─────────────────────────────────────── -->
  <g class="node c-coral">
    <rect x="200" y="650" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="670" text-anchor="middle" dominant-baseline="central">synthesis  (LLM)</text>
    <text class="ts" x="340" y="690" text-anchor="middle" dominant-baseline="central">Rank findings · write recommendations</text>
  </g>
  <line x1="340" y1="706" x2="340" y2="740" class="arr" marker-end="url(#arrow)"/>

  <!-- ── NODE: PERSIST ──────────────────────────────────────── -->
  <g class="node c-teal">
    <rect x="200" y="740" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="760" text-anchor="middle" dominant-baseline="central">persist</text>
    <text class="ts" x="340" y="780" text-anchor="middle" dominant-baseline="central">Save report to MongoDB run store</text>
  </g>
  <line x1="340" y1="796" x2="340" y2="820" class="arr" marker-end="url(#arrow)"/>

  <!-- ── OUTPUT ─────────────────────────────────────────────── -->
  <g class="node c-gray">
    <rect x="200" y="820" width="280" height="20" rx="6" stroke-width="0.5"/>
    <text class="ts" x="340" y="830" text-anchor="middle" dominant-baseline="central">Prioritised quality-intelligence report</text>
  </g>

</svg>
