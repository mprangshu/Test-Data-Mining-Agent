<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="600" viewBox="0 0 1180 600" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b45309"/>
    </marker>
    <style>
      .t  { font-size: 13px; fill: #0f172a; font-weight: 600; }
      .s  { font-size: 10.5px; fill: #475569; }
      .lab{ font-size: 11px; fill: #64748b; }
      .hd { font-size: 15px; fill: #0f172a; font-weight: 700; }
    </style>
  </defs>

  <rect x="0" y="0" width="1180" height="600" fill="#f8fafc"/>
  <text x="24" y="34" class="hd">Test Data Mining Agent — v3 architecture (LangGraph · test-data generation)</text>
  <text x="24" y="54" class="lab">parse → load_results → mongo_lookup → vector_search → coverage_gap → generate → review (HITL) → synthesise → persist</text>

  <!-- Inputs -->
  <rect x="24" y="78" width="220" height="46" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="36" y="98" class="t">Primary: test cases / stories</text>
  <text x="36" y="114" class="s">.xlsx .csv .json .txt (Gherkin)</text>

  <rect x="24" y="132" width="220" height="46" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="36" y="152" class="t">Supporting: test results</text>
  <text x="36" y="168" class="s">JUnit .xml · Playwright .json</text>

  <!-- Pipeline nodes (row at y=250) : x = 24 + i*128, w=116, h=64 -->
  <g>
    <rect x="24"  y="250" width="116" height="64" rx="9" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="34" y="278" class="t">parse</text><text x="34" y="296" class="s">fields · rows</text><text x="34" y="309" class="s">columns</text>

    <rect x="152" y="250" width="116" height="64" rx="9" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="162" y="278" class="t">load_results</text><text x="162" y="296" class="s">signals +</text><text x="162" y="309" class="s">seed values</text>

    <rect x="280" y="250" width="116" height="64" rx="9" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="290" y="278" class="t">mongo_lookup</text><text x="290" y="296" class="s">fetched</text><text x="290" y="309" class="s">(read-only)</text>

    <rect x="408" y="250" width="116" height="64" rx="9" fill="#e9d5ff" stroke="#9333ea"/>
    <text x="418" y="278" class="t">vector_search</text><text x="418" y="296" class="s">gathered</text><text x="418" y="309" class="s">(MiniLM)</text>

    <rect x="536" y="250" width="116" height="64" rx="9" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="546" y="278" class="t">coverage_gap</text><text x="546" y="296" class="s">field ×</text><text x="546" y="309" class="s">scenario</text>

    <rect x="664" y="250" width="116" height="64" rx="9" fill="#fed7aa" stroke="#ea580c"/>
    <text x="674" y="278" class="t">generate</text><text x="674" y="296" class="s">candidate</text><text x="674" y="309" class="s">value sets</text>

    <rect x="792" y="250" width="116" height="64" rx="9" fill="#fde68a" stroke="#b45309"/>
    <text x="802" y="278" class="t">review</text><text x="802" y="296" class="s">HITL gate</text><text x="802" y="309" class="s">(always)</text>

    <rect x="920" y="250" width="116" height="64" rx="9" fill="#fed7aa" stroke="#ea580c"/>
    <text x="930" y="278" class="t">synthesise</text><text x="930" y="296" class="s">coherent</text><text x="930" y="309" class="s">rows + prov.</text>

    <rect x="1048" y="250" width="108" height="64" rx="9" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="1058" y="278" class="t">persist</text><text x="1058" y="296" class="s">save gate</text><text x="1058" y="309" class="s">(opt-in)</text>
  </g>

  <!-- pipeline arrows -->
  <g stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)" fill="none">
    <line x1="140" y1="282" x2="150" y2="282"/>
    <line x1="268" y1="282" x2="278" y2="282"/>
    <line x1="396" y1="282" x2="406" y2="282"/>
    <line x1="524" y1="282" x2="534" y2="282"/>
    <line x1="652" y1="282" x2="662" y2="282"/>
    <line x1="780" y1="282" x2="790" y2="282"/>
    <line x1="908" y1="282" x2="918" y2="282"/>
    <line x1="1036" y1="282" x2="1046" y2="282"/>
  </g>

  <!-- inputs into parse/load_results -->
  <g stroke="#6366f1" stroke-width="1.4" marker-end="url(#arrow)" fill="none">
    <path d="M244,101 C300,101 60,180 82,248"/>
    <path d="M244,155 C300,180 180,200 200,248"/>
  </g>

  <!-- HITL interrupt/resume -->
  <path d="M850,250 C850,210 700,210 722,248" stroke="#b45309" stroke-width="1.5" fill="none" marker-end="url(#arrowAmber)" stroke-dasharray="5 4"/>
  <text x="700" y="206" class="s" fill="#b45309">interrupt() ⇄ Command(resume) — analyst picks a value set per field</text>

  <!-- Output -->
  <rect x="920" y="360" width="236" height="58" rx="9" fill="#dcfce7" stroke="#16a34a"/>
  <text x="932" y="383" class="t">Output: CSV (clean) + provenance rows</text>
  <text x="932" y="401" class="s">originals + generated + fetched + gathered · always ≥ input · same columns</text>
  <line x1="978" y1="314" x2="978" y2="358" stroke="#16a34a" stroke-width="1.6" marker-end="url(#arrow)" fill="none"/>

  <!-- generate-more loop -->
  <path d="M920,389 C620,470 980,470 990,420" stroke="#16a34a" stroke-width="1.4" fill="none" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
  <text x="600" y="486" class="s" fill="#15803d">/generate-more — analyst selects rows → fresh grounded round (replace)</text>

  <!-- Stores -->
  <rect x="280" y="392" width="116" height="50" rx="9" fill="#e2e8f0" stroke="#475569"/>
  <text x="294" y="414" class="t">MongoDB</text><text x="294" y="430" class="s">documents</text>
  <line x1="338" y1="314" x2="338" y2="390" stroke="#475569" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>

  <rect x="408" y="392" width="116" height="50" rx="9" fill="#e2e8f0" stroke="#475569"/>
  <text x="422" y="414" class="t">ChromaDB</text><text x="422" y="430" class="s">vectors (384-d)</text>
  <line x1="466" y1="314" x2="466" y2="390" stroke="#475569" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>

  <rect x="536" y="392" width="150" height="50" rx="9" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="548" y="414" class="t">all-MiniLM-L6-v2</text><text x="548" y="430" class="s">local · offline embeddings</text>

  <rect x="700" y="392" width="150" height="50" rx="9" fill="#fff7ed" stroke="#fb923c" stroke-dasharray="4 3"/>
  <text x="712" y="414" class="t">Gemini (optional)</text><text x="712" y="430" class="s">LLM seam · det. fallback</text>

  <!-- persist write-back -->
  <path d="M1080,314 C1080,360 470,360 396,392" stroke="#475569" stroke-width="1.2" fill="none" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="980" y="338" class="s">persist (save=true) → write back</text>

  <!-- Legend -->
  <text x="24" y="528" class="lab" font-weight="700">Legend</text>
  <rect x="24"  y="538" width="16" height="14" rx="3" fill="#ccfbf1" stroke="#0d9488"/><text x="46" y="550" class="s">deterministic</text>
  <rect x="150" y="538" width="16" height="14" rx="3" fill="#e9d5ff" stroke="#9333ea"/><text x="172" y="550" class="s">vector (ChromaDB)</text>
  <rect x="310" y="538" width="16" height="14" rx="3" fill="#fed7aa" stroke="#ea580c"/><text x="332" y="550" class="s">LLM seam (Gemini / fallback)</text>
  <rect x="540" y="538" width="16" height="14" rx="3" fill="#fde68a" stroke="#b45309"/><text x="562" y="550" class="s">human-in-the-loop (always runs)</text>
  <rect x="780" y="538" width="16" height="14" rx="3" fill="#dcfce7" stroke="#16a34a"/><text x="802" y="550" class="s">output / loop</text>
  <text x="24" y="576" class="lab">Invariants: read-only until the persist save gate · MongoDB + ChromaDB only (no graph DB) · deterministic-before-LLM · graceful degradation · schema-agnostic · additive (output ≥ input).</text>
</svg>
